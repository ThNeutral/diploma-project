<div class="prediction-result">
  <table class="result-table">
    <tr class="result-table-row-header">
      <th>Prediction</th>
      <th>Confidence</th>
    </tr>
    @for (result of sortedResults(); track result[0]) {
      <tr class="result-table-row-body">
        <td class="prediction-row">
          <div class="prediction-row-label">{{ result[0] }}</div>
        </td>
        <td class="confidence-row">
          <div
            class="confidence-foreground"
            [style.width.%]="(result[1] / result[2]) * 90"
            [style.z-index]="1"
          ></div>
          <div class="confidence-background" [style.width.%]="90" [style.z-index]="0"></div>
        </td>
      </tr>
    }
  </table>
  <button
    [disabled]="!inputImage || loadingResults()"
    class="btn-infer"
    (click)="onStartInference($event)"
  >
    @if (!inputImage) {
      Please upload image.
    } @else if (loadingResults()) {
      Running inference...
    } @else {
      Run inference.
    }
  </button>
</div>
